   BLAZING CHAIN - a single-file DoDonPachi-inspired bullet hell

const keys={};
addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if(e.repeat) return;
  keys[e.code]=true;
  bootAudio();
  if(e.code==='KeyM'){muted=!muted; if(muted) laserSndOff();}
  if(e.code==='KeyP'&&state===S.PLAY){paused=!paused; if(paused) laserSndOff();}
  if(e.code==='KeyC') insertCoin();
  if(state===S.TITLE&&typeBUnlocked&&(e.code==='ArrowLeft'||e.code==='ArrowRight')){
    shipType^=1; blip(700,940,0.06,'square',0.2);
  }
  if(CHEAT.debug){
    if(e.code==='KeyI'){ cheatInv=!cheatInv; cheatUsed=true; }
    if(e.code==='KeyG'&&state===S.PLAY){ power=4; bombs=5; cheatUsed=true; }
    if(e.code==='KeyL'&&state===S.PLAY){ cheatUsed=true; startLoop2(); announce('LOOP 2 (DEBUG)'); }
    if(e.code==='KeyB'&&state===S.PLAY){ cheatUsed=true; jumpToBoss(); }
  }
  if(state!==S.PLAY&&(e.code==='KeyZ'||e.code==='Enter')) advance();
});
addEventListener('keyup',e=>{keys[e.code]=false;});
addEventListener('contextmenu',e=>e.preventDefault());

// touch: pointer 1 drags the ship (autofire), pointer 2 held = laser
const touches=new Map();
let accDX=0, accDY=0, touchFire=false, touchLaser=false, bombTapped=false;
function toGame(e){
  const r=cv.getBoundingClientRect();
  return {x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H};
}
function refreshTouchFlags(){
  touchFire=false; touchLaser=false;
  for(const t of touches.values()){
    if(t.role==='move') touchFire=true;
    if(t.role==='laser') touchLaser=true;
  }
}
addEventListener('pointerdown',e=>{
  bootAudio();
  if(state!==S.PLAY){
    const q=toGame(e);
    if(q.x>W-56&&q.y>H-28){ insertCoin(); return; }
    advance(); return;
  }
  const p=toGame(e);
  if(p.x>W-52&&p.y>H-30){bombTapped=true; return;}
  touches.set(e.pointerId, touches.size===0
    ? {role:'move',lx:p.x,ly:p.y}
    : {role:'laser'});
  refreshTouchFlags();
  e.preventDefault();
});
addEventListener('pointermove',e=>{
  const t=touches.get(e.pointerId);
  if(!t||t.role!=='move') return;
  const p=toGame(e);
  accDX+=(p.x-t.lx)*1.15; accDY+=(p.y-t.ly)*1.15;
  t.lx=p.x; t.ly=p.y;
});
function dropTouch(e){touches.delete(e.pointerId); refreshTouchFlags();}
addEventListener('pointerup',dropTouch);
addEventListener('pointercancel',dropTouch);

// ---------- audio (tiny webaudio synth) ----------
let AC=null, masterGain=null, muted=false, laserNode=null, shotSfxCd=0;
function bootAudio(){
  if(AC) return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=AC.createGain(); masterGain.gain.value=0.16;
    masterGain.connect(AC.destination);
  }catch(err){}
}
function blip(f0,f1,dur,type,vol,at){
  if(!AC||muted) return;
  const t=AC.currentTime+(at||0), o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square';
  o.frequency.setValueAtTime(f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol||0.4,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t+dur+0.05);
}
function noiseHit(dur,vol,dark,at){
  if(!AC||muted) return;
  const t=AC.currentTime+(at||0), len=(AC.sampleRate*dur)|0;
  const buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(); src.buffer=buf;
  const g=AC.createGain();
  g.gain.setValueAtTime(vol||0.4,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  let node=src;
  if(dark){const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=650; src.connect(f); node=f;}
  node.connect(g); g.connect(masterGain); src.start(t);
}
function sfxShot(){ if(shotSfxCd>0)return; shotSfxCd=3; blip(880,320,0.045,'square',0.10); }
function sfxHit(){ noiseHit(0.03,0.08); }
function sfxBoom(){ noiseHit(0.22,0.35,true); blip(220,50,0.2,'triangle',0.3); }
function sfxBoomBig(){ noiseHit(0.5,0.55,true); blip(160,32,0.5,'triangle',0.45); }
function sfxBomb(){ blip(70,700,0.5,'sawtooth',0.4); noiseHit(0.6,0.5,true); }
function sfxWarn(){ blip(680,680,0.16,'square',0.25); blip(510,510,0.16,'square',0.25); }
function sfxPhase(){ blip(140,60,0.35,'sawtooth',0.4); noiseHit(0.3,0.4,true); }
function sfxCoin(){ blip(1046,1046,0.07,'square',0.3); blip(1568,1568,0.12,'square',0.3,0.08); }
function sfxBossDown(){
  noiseHit(1.2,0.6,true,0);            // main rumble
  blip(140,28,1.0,'sine',0.5,0);       // sub drop
  noiseHit(0.3,0.35,true,0.15);        // secondary blasts
  noiseHit(0.25,0.3,true,0.34);
  noiseHit(0.35,0.4,true,0.55);
  blip(180,1500,0.7,'sawtooth',0.16,0.05);   // energy release
  const N=[523,659,784,1046];          // victory arpeggio
  N.forEach((f,i)=>blip(f,f,0.14,'square',0.22,0.78+i*0.07));
  blip(1046,1046,0.55,'square',0.2,0.78+0.28);
  blip(1053,1053,0.55,'square',0.12,0.78+0.28);  // detune layer
}
function laserSndOn(){
  if(!AC||muted||laserNode) return;
  const o=AC.createOscillator(), g=AC.createGain(), l=AC.createOscillator(), lg=AC.createGain();
  o.type='sawtooth'; o.frequency.value=72;
  l.frequency.value=21; lg.gain.value=26;
  l.connect(lg); lg.connect(o.frequency);
  g.gain.value=0.09; o.connect(g); g.connect(masterGain);
  o.start(); l.start();
  laserNode={o,g,l};
}
function laserSndOff(){
  if(!laserNode) return;
  const t=AC.currentTime;
  laserNode.g.gain.setTargetAtTime(0,t,0.03);
  laserNode.o.stop(t+0.15); laserNode.l.stop(t+0.15);
  laserNode=null;
}

    if(k!=='.'){g.fillStyle=P[k]; g.fillRect(x,y,1,1);}

  return c;
}

const HULL={
  T:48, cols:6,
  PLAIN:[0,1,2], RIVET:[3,4,5], PANEL:[6,7], STRUT:[8,9],
  GRATE:[10,11], HEXP:[12,13], DOOR:[14,15,16,17]
};
HULL.FAMS=[HULL.PLAIN,HULL.PLAIN,HULL.RIVET,HULL.PANEL];
const atlasImg=new Image();
let atlasReady=false;
atlasImg.onload=()=>{ atlasReady=true; };
atlasImg.src=ATLAS_B64;
function modp(n,m){ return ((n%m)+m)%m; }
function hullTile(i,dx,dy){
  ctx.drawImage(atlasImg,(i%HULL.cols)*HULL.T,((i/HULL.cols)|0)*HULL.T,
    HULL.T,HULL.T,dx,dy,HULL.T,HULL.T);
}

// ---------- enemy bullets & patterns ----------
function eb(x,y,ang,spd,type,r){
  if(ebul.length>=TUNE.bulletCap) return;
  const m=(stage===2?DIFF.stage2Spd:1)*(loop===2?DIFF.loop2Spd:1);
  ebul.push({x,y,vx:Math.cos(ang)*spd*m,vy:Math.sin(ang)*spd*m,type:type||0,r:r||2});
}
function aimAng(x,y){ return Math.atan2(player.y-y, player.x-x); }
function ring(x,y,n,spd,off,type){ for(let i=0;i<n;i++) eb(x,y,(off||0)+i/n*TAU,spd,type===undefined?1:type); }
function fan(x,y,n,spread,spd,type){
  const a=aimAng(x,y);
  for(let i=0;i<n;i++) eb(x,y,a+(i-(n-1)/2)*spread,spd,type||0);
}

// ---------- enemy spawns ----------
function spawnBee(x,dir,weave){ enemies.push({k:'bee',x,y:-8,vx:0,dir,weave,t:0,hp:1,sc:100,r:4,fired:false}); }
function spawnRain(x){ enemies.push({k:'rain',x,y:-8,t:0,hp:1,sc:80,r:4,fired:Math.random()<0.5}); }
function spawnHeli(side,y){ enemies.push({k:'heli',x:side<0?-10:W+10,y,side,t:0,hp:4,sc:300,r:6}); }
function spawnTank(x){ enemies.push({k:'tank',x,y:-14,t:0,hp:26,sc:1500,r:8}); }
function spawnSpin(x,ty){ enemies.push({k:'spin',x,y:-10,ty,t:0,hp:18,sc:1200,r:6,a:rnd(TAU)}); }

// ---------- enemy behaviour ----------
function updateEnemies(){
  for(const e of enemies){
    e.t++;
    if(e.flash>0)e.flash--;
    switch(e.k){
      case 'bee':
        e.y+=1.4;
        if(e.weave&&e.t>30&&e.t%48===0) e.dir*=-1;
        if(e.t>26){ e.vx=Math.min(1.15,e.vx+0.035); }
        e.x+=e.vx*e.dir;
        if(!e.fired&&e.y>70){ e.fired=true; eb(e.x,e.y,aimAng(e.x,e.y),1.5); }
        if(e.y>H+10||e.x<-14||e.x>W+14) e.dead=true;
        break;
      case 'rain':
        e.y+=2.1; e.x+=Math.sin(e.t*0.12)*0.35;
        if(!e.fired&&e.y>60){ e.fired=true; eb(e.x,e.y,aimAng(e.x,e.y),1.2); }
        if(e.y>H+10) e.dead=true;
        break;
      case 'heli':
        e.x+=e.side*0.95;
        e.y+=Math.sin(e.t*0.05)*0.5;
        if(e.t>30&&e.t%70===0) fan(e.x,e.y,3,0.3,1.35);
        if(e.x<-16||e.x>W+16) e.dead=true;
        break;
      case 'tank':
        if(e.y<64) e.y+=0.6;
        else if(e.t<460){
          if(e.t%96===0) ring(e.x,e.y,10,1.05,rnd(TAU));
          if(e.t%56===20){
            const a=aimAng(e.x,e.y);
            eb(e.x,e.y,a-0.1,1.8); eb(e.x,e.y,a+0.1,1.8);
          }
        } else e.y+=0.7;
        if(e.y>H+16) e.dead=true;
        break;
      case 'spin':
        if(e.y<e.ty) e.y+=0.8;
        else if(e.t<300){
          if(e.t%4===0){ eb(e.x,e.y,e.a,1.3,1); e.a+=0.47; }
        } else e.y-=1.2;
        if(e.y<-14) e.dead=true;
        break;
      case 'orb':
        if(e.y<e.ty) e.y+=0.7;
        else if(e.t<430){
          e.x+=Math.sin(e.t*0.03)*0.4;
          const c=e.t%130;
          if(c===40||c===48||c===56) eb(e.x,e.y,aimAng(e.x,e.y),1.9);
        } else e.y-=0.9;
        if(e.y<-12) e.dead=true;
        break;
      case 'mid':
        if(e.y<62) e.y+=0.5;
        else if(e.t<1000){
          e.x=W/2+Math.sin(e.t*0.02)*30;
          if(e.t%92===0) ring(e.x,e.y+8,14,1.1,rnd(TAU));
          if(e.t%64===30) fan(e.x,e.y+10,5,0.2,1.55);
          if(e.hp<100&&e.t%5===0){ eb(e.x,e.y+10,e.a,1.25,1); e.a+=0.33; }
        } else e.y-=0.8;
        if(e.y<-34) e.dead=true;
        break;
    }
  }
  enemies=enemies.filter(e=>!e.dead);
}

// ---------- boss: QUEEN VESPA ----------
function spawnBoss(kind){
  bossActive=true;
  const k=kind||1;
  boss={kind:k,x:W/2,y:-70,ty:k===2?58:56,t:0,phase:1,
    hp:DIFF.bossHp[k][0],hpMax:DIFF.bossHp[k][0],
    hw:k===2?48:46,hh:k===2?34:30,
    inv:0,sway:0,scis:false,dmgFlash:0,dying:0,podFlash:0,
    pt:DIFF.bossPhaseSec*60,leaving:0};
  announce(k===2?'KING LUCANUS':'QUEEN VESPA');
}
function bossPhaseUp(){
  boss.phase++;
  const maxPh=(boss.kind===2&&loop===2)?4:3;
  if(boss.phase>maxPh){ startBossDeath(); return; }
  if(boss.phase===4) pops.push({x:W/2,y:120,t:0,life:120,txt:'TRUE FORM',big:true,c:'#ff6b5e'});
  boss.hp=DIFF.bossHp[boss.kind][boss.phase-1]; boss.hpMax=boss.hp;
  boss.pt=DIFF.bossPhaseSec*60;
  freezeT=JUICE.freezePhase;
  boss.inv=80; boss.t=0; boss.sway=0;
  clearBulletsToSparks(); sfxPhase(); shake+=6;
}
function startWithdraw(){
  boss.leaving=140; freezeT=4;
  clearBulletsToSparks();
  announce('TIME UP');
  blip(300,110,0.45,'sawtooth',0.3);
}
function startBossDeath(){
  boss.dying=170; freezeT=JUICE.freezeBossDeath; clearBulletsToSparks(); laserSndOff();
}
function startStage2(){
  stage=2;
  stageFrame=0; scriptI=0; buildScript(2);

}
function resolveBossEnd(destroyed){
  const k=boss.kind;
  boss=null; bossActive=false;
  if(k===1){
    pops.push({x:W/2,y:136,t:0,life:160,txt:'STAGE 1 CLEAR',big:true,c:'#7ee08a'});
    if(destroyed){
      const bonus=ECON.clearBonus1+chainMax*ECON.chainBonus1;
      score+=bonus; if(score>hiscore)hiscore=score; saveHi(hiscore);
      pops.push({x:W/2,y:154,t:0,life:160,txt:'BONUS '+bonus,big:true,c:'#ffe24a'});
    } else {
      pops.push({x:W/2,y:154,t:0,life:160,txt:'NO DESTRUCTION BONUS',big:true,c:'#8b93b4'});
    }
    startStage2();
  } else if(loop===1&&!loopLocked){
    pops.push({x:W/2,y:126,t:0,life:180,txt:'ALL CLEAR',big:true,c:'#7ee08a'});
    if(destroyed){
      const bonus=ECON.clearBonus2+chainMax*ECON.chainBonus2;
      score+=bonus; if(score>hiscore)hiscore=score; saveHi(hiscore);
      pops.push({x:W/2,y:144,t:0,life:180,txt:'BONUS '+bonus,big:true,c:'#ffe24a'});
    }
    pops.push({x:W/2,y:166,t:0,life:180,txt:'SECOND LOOP',big:true,c:'#ff5ca8'});
    if(pacifist&&!cheatUsed) unlockTypeB();
    startLoop2();
  } else {
    if(destroyed){
      const bonus=(loop===2?ECON.trueBonus+chainMax*ECON.trueChainBonus:ECON.clearBonus2+chainMax*ECON.chainBonus2);
      score+=bonus; if(score>hiscore)hiscore=score; saveHi(hiscore);
      if(loop===2) trueClear=true;
      pops.push({x:W/2,y:150,t:0,life:130,txt:'BONUS '+bonus,big:true,c:'#ffe24a'});
    }
    state=S.WIN; laserSndOff();
  }
}
function updateBoss(){
  if(!boss) return;
  if(boss.dmgFlash>0) boss.dmgFlash--;
  if(boss.podFlash>0) boss.podFlash--;
  if(boss.leaving>0){
    boss.leaving--; boss.y-=1.3;
    if(boss.leaving%14===0) spark(boss.x+rnd(-30,30),boss.y+rnd(-20,20),'#8b93b4',3);
    if(boss.leaving===0||boss.y<-70) resolveBossEnd(false);
    return;
  }
  if(boss.dying>0){
    boss.dying--;
    if(boss.dying%6===0) boomAt(boss.x+rnd(-46,46), boss.y+rnd(-26,30), 1);
    shake=Math.max(shake,2.5);
    if(boss.dying===0){
      boomAt(boss.x,boss.y,4); flash=12;
      rings.push({x:boss.x,y:boss.y,r:4,vr:3.2,life:40,c:'#f4f4f8'});
      sfxBossDown();
      resolveBossEnd(true);
    }
    return;
  }
  if(boss.y<boss.ty){ boss.y+=0.8; return; }
  boss.t++;
  if(boss.inv<=0){
    boss.pt--;
    if(boss.pt<=0){
      const maxPh=(boss.kind===2&&loop===2)?4:3;
      if(boss.phase>=maxPh){ startWithdraw(); return; }
      bossPhaseUp(); return;
    }
  }
  if(boss.kind===2) boss.x=W/2+Math.sin(boss.t*0.011)*(boss.phase===2?52:34);
  else boss.x=W/2+Math.sin(boss.t*0.008)*(boss.phase===2?46:26);
  if(boss.inv>0){ boss.inv--; return; }
  const t=boss.t, sx=boss.x;
  if(boss.kind===2){
    const tL={x:sx-26,y:boss.y+40}, tR={x:sx+26,y:boss.y+40}, hd={x:sx,y:boss.y+24};
    if(boss.phase===1){
      if(t%14===0){
        const p=((t/14)|0)%2===0?tL:tR;
        eb(p.x,p.y,aimAng(p.x,p.y)+rnd(-0.06,0.06),2.1);
        boss.podFlash=4;
      }
      if(t%130===0) fan(hd.x,hd.y,7,0.16,1.6);
      if(t%160===80) ring(sx,boss.y+6,12,1.15,rnd(TAU));
    } else if(boss.phase===2){
      if(t%6===0){
        eb(tL.x,tL.y,boss.sway,1.35,1);
        eb(tR.x,tR.y,Math.PI-boss.sway,1.35,1);
        boss.sway+=0.24;
      }
      if(t%110===55){ const a=aimAng(hd.x,hd.y); eb(hd.x,hd.y,a,2.3); eb(hd.x,hd.y,a,1.9); }
      if(t%150===0){ fan(hd.x,hd.y,5,0.2,1.8); boss.podFlash=5; }
    } else if(boss.phase===3){
      if(t%150===0){
        boss.scis=!boss.scis;
        const gap=boss.scis?40+rnd(60):W-100+rnd(60);
        for(let x=8;x<W;x+=9) if(Math.abs(x-gap)>22) ebul.push({x,y:boss.y+34,vx:0,vy:1.55,type:0,r:2});
      }
      if(t%70===0) ring(sx,boss.y+6,16,1.1,rnd(TAU));
      const step=boss.hp<320?4:6;
      if(t%step===0){ eb(sx,boss.y+8,boss.sway,1.5); boss.sway+=0.33; }
      const c=t%120;
      if(c===60||c===64||c===68){
        eb(tL.x,tL.y,aimAng(tL.x,tL.y),2.2);
        eb(tR.x,tR.y,aimAng(tR.x,tR.y),2.2);
        boss.podFlash=4;
      }
    } else {                             // TRUE FORM: five arm storm
      if(t%3===0){
        for(let k=0;k<5;k++) eb(sx,boss.y+4,boss.sway+k*TAU/5,1.1,1);
        boss.sway+=boss.hp<250?0.19:0.13;
      }
      if(t%90===0) fan(hd.x,hd.y,3,0.12,2.0);
      if(t%140===70) ring(sx,boss.y+4,24,1.05,rnd(TAU),0);
    }
    return;
  }
  const nose=boss.y+38, podY=boss.y+2;
  if(boss.phase===1){
    if(t%110===0){ fan(sx,nose,5,0.2,1.45); boss.podFlash=6; }
    if(t%110===55) fan(sx,nose,6,0.17,1.7);
    if(t%150===40){ ring(sx-40,podY,9,1.1,rnd(TAU)); ring(sx+40,podY,9,1.1,rnd(TAU)); boss.podFlash=6; }
    if(t%46===0){ const px=t%92===0?sx-40:sx+40; eb(px,podY,aimAng(px,podY),2.0); }
  } else if(boss.phase===2){
    if(t%5===0){ eb(sx,nose,boss.sway,1.3,1); eb(sx,nose,boss.sway+Math.PI,1.3,1); boss.sway+=0.21; }
    if(t%120===0){ fan(sx,nose,3,0.14,2.2); boss.podFlash=6; }
    if(t%90===45){ eb(sx-40,podY,aimAng(sx-40,podY),1.8); eb(sx+40,podY,aimAng(sx+40,podY),1.8); }
  } else {
    if(t%84===0){ ring(sx,boss.y+10,18,1.05,rnd(TAU)); boss.podFlash=6; }
    if(t%160===80){
      const gap=30+rnd(W-60);
      for(let x=8;x<W;x+=9) if(Math.abs(x-gap)>20) ebul.push({x,y:boss.y+30,vx:0,vy:1.3,type:0,r:2});
    }
    const step=boss.hp<300?4:6;
    if(t%step===0){ eb(sx,nose,boss.sway,1.4); boss.sway+=0.29; }
    if(t%130===65) fan(sx,nose,5,0.22,1.75);
  }
}

// ---------- player ----------
let xLatch=false, touchSeen=false;
function updatePlayer(){
  if(deathT>0){
    deathT--;
    if(deathT===0&&lives>=0){
      player.x=W/2; player.y=H+18; player.inv=150; player.hidden=false; player.entering=32;
    }
    return;
  }
  if(player.hidden) return;
  if(player.entering>0){
    player.entering--; player.y-=1.7;
    accDX=0; accDY=0;
    if(player.inv>0) player.inv--;
    return;
  }
  const p=player;
  const firing=keys.KeyZ||keys.Space||touchFire||touchLaser;
  holdT=firing?holdT+1:0;
  const laser=touchLaser||(holdT>14&&(keys.KeyZ||keys.Space));
  const SH=SHIPS[shipType];
  const spd=laser?SH.focus:SH.spd;
  let dx=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0);
  let dy=(keys.ArrowDown||keys.KeyS?1:0)-(keys.ArrowUp||keys.KeyW?1:0);
  if(dx&&dy){dx*=0.7071;dy*=0.7071;}
  p.x=clamp(p.x+dx*spd+accDX,6,W-6);
  p.y=clamp(p.y+dy*spd+accDY,14,H-8);
  accDX=0; accDY=0;
  laserActive=laser&&firing;
  if(laserActive) pacifist=false;
  if(laserActive) laserSndOn(); else laserSndOff();
  if(firing&&!laserActive&&fireCd<=0){ fireShot(); fireCd=TUNE.shotCd; }
  if(fireCd>0) fireCd--;
  const wantBomb=keys.KeyX||bombTapped;
  if(wantBomb&&!xLatch&&bombs>0&&bombFx<=0){ triggerBomb(); }
  xLatch=!!keys.KeyX;
  bombTapped=false;
  if(p.inv>0) p.inv--;
}
function fireShot(){
  pacifist=false;
  const p=player; sfxShot();
  const sp=SHIPS[shipType].spread;
  const sh=(dx,dy,vx,vy)=>shots.push({x:p.x+dx,y:p.y+dy,vx:vx*sp,vy});
  sh(-3,-7,0,-6); sh(3,-7,0,-6);
  sh(-6,-3,-0.6,-5.8); sh(6,-3,0.6,-5.8);
  if(power>=1){ sh(-8,-1,-1.2,-5.4); sh(8,-1,1.2,-5.4); }
  if(power>=2){ sh(0,-9,0,-6.4); }
  if(power>=3){ sh(-10,1,-1.9,-5.0); sh(10,1,1.9,-5.0); }
  if(power>=4){ sh(-11,2,0,-6); sh(11,2,0,-6); }   // option pods
}

// ---------- combat resolution ----------
function killEnemy(e){
  e.dead=true;
  const mult=Math.min(chain+1,300);
  const val=e.sc*mult;
  score+=val;
  chain++; if(chain>chainMax)chainMax=chain;
  gauge=GAUGE_MAX; chainPulse=JUICE.chainPulse;
  if(e.r>10) freezeT=JUICE.freezeKill;
  pops.push({x:e.x,y:e.y,t:0,life:40,txt:val>=10000?((val/1000)|0)+'K':''+val,c:'#ffe24a'});
  if(e.k==='tank'){ dropToggle=!dropToggle; dropItem(e.x,e.y,dropToggle?'P':'B'); }
  else if(e.k==='spin'){ dropItem(e.x,e.y,'P'); }
  else if(e.k==='mid'){ dropItem(e.x-10,e.y,'P'); dropItem(e.x+10,e.y,'P'); dropItem(e.x,e.y-6,'B'); }
  if(e.k==='orb') ring(e.x,e.y,10,1.25,rnd(TAU));
  if(loop===2&&bombFx<=0){               // revenge bullets
    const ra=aimAng(e.x,e.y);
    if(e.r>6){ eb(e.x,e.y,ra-0.22,DIFF.revengeSpd); eb(e.x,e.y,ra+0.22,DIFF.revengeSpd); }
    else eb(e.x,e.y,ra,DIFF.revengeSpd);
  }
  boomAt(e.x,e.y,e.r>10?2.5:(e.r>6?1.6:1));
  if(chain%10===0) blip(500+chain*3,900,0.07,'square',0.18);
}
function collide(){
  laserHit=false; laserEndY=0;
  // laser beam: bites the closest thing directly ahead
  if(laserActive&&!player.hidden){
    const bw=5;
    let target=null, bestY=-1, isBoss=false;
    for(const e of enemies){
      if(e.y<player.y-3&&Math.abs(e.x-player.x)<bw+e.r&&e.y>bestY){
        bestY=e.y; target=e; isBoss=false;
      }
    }
    if(bossActive&&boss&&!boss.dying&&!boss.leaving&&boss.y>0){
      const by=boss.y+boss.hh;
      if(by<player.y-3&&Math.abs(boss.x-player.x)<bw+boss.hw&&by>bestY){
        bestY=by; target=boss; isBoss=true;
      }
    }
    if(target){
      laserHit=true; laserEndY=bestY-(isBoss?boss.hh-4:target.r);
      if(isBoss){
        shake=Math.max(shake,0.7);
        if(boss.inv<=0){ boss.hp-=SHIPS[shipType].laserDps+power*0.18; boss.dmgFlash=2; if(boss.hp<=0) bossPhaseUp(); }
      } else {
        target.hp-=SHIPS[shipType].laserDps+power*0.18; target.flash=2;
        if(target.hp<=0) killEnemy(target);
      }
      if(frame%3===0) spark(player.x+rnd(-3,3),laserEndY,'#9fd8ff',2);
    }
  }
  // player shots
  for(const s of shots){
    if(bossActive&&boss&&!boss.dying&&!boss.leaving&&
       Math.abs(s.x-boss.x)<boss.hw&&Math.abs(s.y-boss.y)<boss.hh){
      s.dead=true;
      if(boss.inv<=0){ boss.hp-=1; boss.dmgFlash=2; sfxHit(); if(boss.hp<=0) bossPhaseUp(); }
      continue;
    }
    for(const e of enemies){
      if(e.dead) continue;
      if(dist2(s.x,s.y,e.x,e.y)<(e.r+2)*(e.r+2)){
        s.dead=true; e.hp-=1; e.flash=3; sfxHit();
        spark(s.x,s.y,'#ffe24a',1);
        if(e.hp<=0) killEnemy(e);
        break;
      }
    }
  }
  shots=shots.filter(s=>!s.dead);
  enemies=enemies.filter(e=>!e.dead);
  // bomb burn
  if(bombFx>0){
    for(const e of enemies){
      e.hp-=0.5; e.flash=2;
      if(e.hp<=0&&!e.dead) killEnemy(e);
    }
    enemies=enemies.filter(e=>!e.dead);
    if(bossActive&&boss&&!boss.dying&&!boss.leaving&&boss.inv<=0){
      boss.hp-=0.35; boss.dmgFlash=1;
      if(boss.hp<=0) bossPhaseUp();
    }
  }
  // things that kill the player
  if(!player.hidden&&player.inv<=0&&deathT===0&&!cheatInv){
    for(const b of ebul){
      const hr=TUNE.hitR+b.r*0.8;
      if(dist2(b.x,b.y,player.x,player.y)<hr*hr){ die(); return; }
    }
    for(const e of enemies){
      const hr=e.r+3;
      if(dist2(e.x,e.y,player.x,player.y)<hr*hr){ die(); return; }
    }
    if(bossActive&&boss&&!boss.dying&&!boss.leaving&&
       Math.abs(player.x-boss.x)<boss.hw-2&&Math.abs(player.y-boss.y)<boss.hh-2) die();
  }
}
function updateChain(){
  if(chain>0){
    gauge-=laserHit?TUNE.laserSustain:TUNE.chainDrain;
    if(gauge<=0){ gauge=0; chain=0; }
  }
  if(extendAt.length&&score>=extendAt[0]){
    extendAt.shift(); lives++;
    pops.push({x:W/2,y:140,t:0,life:110,txt:'EXTEND!',big:true,c:'#7ee08a'});
    blip(520,1040,0.3,'square',0.3);
  }
  if(score>hiscore) hiscore=score;
}

function updateShots(){

  shots=shots.filter(s=>!s.dead);
}
function updateEbul(){
  for(const b of ebul){ b.x+=b.vx; b.y+=b.vy; b.t=(b.t||0)+1; }
  ebul=ebul.filter(b=>b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);

// ---------- particles ----------
function spark(x,y,c,n){
  for(let i=0;i<n;i++){
    if(parts.length>420) return;
    const a=rnd(TAU), v=rnd(0.4,1.6);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:14+rnd(10),c,s:1});
  }
}
function boomAt(x,y,size){
  const cols=['#ffe24a','#ffb340','#ff6b5e','#f4f4f8'];
  const n=Math.min(10+size*10,60);
  for(let i=0;i<n;i++){
    if(parts.length>420) break;
    const a=rnd(TAU), v=rnd(0.5,1.6+size);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      life:16+rnd(12)+size*4,c:cols[(Math.random()*cols.length)|0],s:size>2?2:1});
  }
  rings.push({x,y,r:2,vr:0.9+size*0.5,life:14+size*5,c:'#ffb340'});
  shake=Math.max(shake,size*1.6);
  if(size>=2.5) sfxBoomBig(); else sfxBoom();
}
function updateFx(){
  for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; p.life--; }
  parts=parts.filter(p=>p.life>0);
  for(const r of rings){ r.r+=r.vr; r.life--; }
  rings=rings.filter(r=>r.life>0);
  for(const p of pops){ p.t++; if(!p.big) p.y-=0.4; }
  pops=pops.filter(p=>p.t<p.life);
  if(shotSfxCd>0) shotSfxCd--;
  if(chainPulse>0) chainPulse--;
  if(bombFx>0) bombFx--;
  if(flash>0) flash--;
  shake*=0.86; if(shake<0.3) shake=0;
}

// ---------- background: installation tarmac, one quiet motif ----------
function hash2(a,b){
  let h=(a*374761393+b*668265263)|0;
  h=(h^(h>>>13))*1274126177|0;
  return (h^(h>>>16))>>>0;
}
function initBg(){
  stars=[]; gy=0;
  for(let i=0;i<30;i++)
    stars.push({x:rnd(W),y:rnd(H),v:i<18?0.35:0.8,c:i<18?TARMAC.dust1:TARMAC.dust2});
}
function updateBg(){
  gy+=0.55;
  for(const s of stars){ s.y+=s.v; if(s.y>H){ s.y=-2; s.x=rnd(W); } }
}

// ---------- drawing ----------
function disc(x,y,r,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill(); }
function drawBgTarmac(){
  ctx.fillStyle=TARMAC.base; ctx.fillRect(0,0,W,H);
  const T=40;
  for(let y=(gy%T)-T;y<H;y+=T){         // subtle tile shading
    const ty=((y-gy)/T)|0;
    for(let tx=0;tx<6;tx++){
      const h=hash2(tx,ty)&3;
      if(h===2){ ctx.fillStyle=TARMAC.tileA; ctx.fillRect(tx*T,y|0,T,T); }
      else if(h===3){ ctx.fillStyle=TARMAC.tileB; ctx.fillRect(tx*T,y|0,T,T); }
    }
  }
  ctx.fillStyle=TARMAC.seam;            // grid seams
  for(let x=T;x<W;x+=T) ctx.fillRect(x,0,1,H);
  for(let y=(gy%T)-T;y<H;y+=T) ctx.fillRect(0,y|0,W,1);
  ctx.fillStyle=TARMAC.paint;           // painted centre dashes
  for(let y=(gy%16)-16;y<H;y+=16) ctx.fillRect(119,y|0,2,8);
  for(let y=(gy%T)-T;y<H;y+=T){         // faded hazard striping, sparse
    const ty=((y-gy)/T)|0;
    for(let tx=0;tx<6;tx++){
      const h=hash2(tx*3+1,ty*5+2);
      if(h%9) continue;
      const bx=tx*T, by=(y|0)+((h&1)?1:T-5);
      ctx.fillStyle=TARMAC.paint;
      for(let i=0;i<T;i+=8){
        ctx.fillRect(bx+i,by,4,2);
        ctx.fillRect(bx+i+2,by+2,4,2);
      }
    }
  }
  for(let s=(((gy-H)/200)|0)-1; s<=((gy/200)|0)+1; s++){   // rare pad markings
    const h=hash2(s,7);
    if(h%3) continue;
    const px=34+(h%172), py=gy-(s*200+((h>>4)%120));
    if(py<-30||py>H+30) continue;
    ctx.strokeStyle=TARMAC.paint;
    ctx.beginPath(); ctx.arc(px,py,13,0,TAU); ctx.stroke();
    ctx.beginPath(); ctx.arc(px,py,8,0,TAU); ctx.stroke();
  }
  for(const s of stars){ ctx.fillStyle=s.c; ctx.fillRect(s.x|0,s.y|0,1,1); }
}
function drawBgHull(){
  const T=HULL.T;
  for(let y=(gy%T)-T;y<H;y+=T){
    const wr=Math.round((gy-y)/T);
    const dmod=modp(wr,9);
    for(let bx=0;bx<5;bx++){
      let idx;
      if((bx===1||bx===2)&&(dmod===2||dmod===3)){
        idx=HULL.DOOR[(dmod-2)*2+(bx-1)];       // 2x2 blast door feature
      } else if(modp(wr,6)===5){
        idx=HULL.STRUT[hash2(bx,wr)%2];         // bulkhead band
      } else if(bx===0||bx===4){
        idx=HULL.PANEL[hash2(bx,wr>>2)%2];      // edge rails
      } else {
        const fam=HULL.FAMS[hash2(bx,wr>>2)%HULL.FAMS.length];
        idx=fam[hash2(bx*7,wr)%fam.length];     // lanes, family shifts every 4 rows
        const h=hash2(bx+9,wr);
        if(h%14===0) idx=HULL.GRATE[h%2];
        else if(h%14===1) idx=HULL.HEXP[h%2];
      }
      hullTile(idx,bx*T,y|0);
    }
  }
}
function drawBg(){
  if(stage===1&&atlasReady) drawBgHull();
  else drawBgTarmac();
}
function drawShots(){
  ctx.fillStyle='#bfe9ff';

function drawSprite(spr,x,y,fl,wOv,hOv){

  ctx.fillStyle='#0d0e18'; ctx.fillRect(bx-1,by-21,2,38);     // seam
  ctx.fillStyle='#454b63';
  ctx.fillRect(bx-38,by-17,30,3); ctx.fillRect(bx+8,by-17,30,3);
  ctx.fillStyle='#2a2440'; ctx.fillRect(bx-30,by-34,60,12);   // pronotum
  ctx.fillStyle='#454b63';
  for(let i=-2;i<=2;i++) ctx.fillRect(bx+i*11-1,by-32,2,2);
  ctx.fillStyle='#241f36'; ctx.fillRect(bx-14,by+18,28,12);   // head
  ctx.fillStyle='#ff3b3b';
  ctx.fillRect(bx-9,by+21,4,4); ctx.fillRect(bx+5,by+21,4,4);
  const mand=s=>{                                // mandibles
    ctx.fillStyle='#3a3f52';
    ctx.beginPath();
    ctx.moveTo(bx+s*22,by+26);
    ctx.lineTo(bx+s*30,by+34);
    ctx.lineTo(bx+s*26,by+48);
    ctx.lineTo(bx+s*12,by+52);
    ctx.lineTo(bx+s*16,by+40);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#8b93b4'; ctx.stroke();
  };
  mand(-1); mand(1);
  if(boss.podFlash>0){ disc(bx-26,by+40,3,'#f4f4f8'); disc(bx+26,by+40,3,'#f4f4f8'); }
  const cr=6+Math.sin(frame*0.2)*1.5;            // core
  disc(bx,by,cr+2,'rgba(255,255,255,.15)');
  disc(bx,by,cr,coreCol);
  disc(bx,by,cr-3,'#f4f4f8');
  if(boss.inv>0&&frame%4<2){
    ctx.strokeStyle='#9fd8ff'; ctx.beginPath(); ctx.arc(bx,by,58,0,TAU); ctx.stroke();
  }
  if(boss.dmgFlash>0){
    ctx.fillStyle='rgba(255,255,255,.45)'; ctx.fillRect(bx-52,by-36,104,92);
  }
}
function drawLaser(){
  if(!laserActive||player.hidden) return;
  const y0=laserEndY, y1=player.y-7;
  if(y1<=y0) return;
  const wob=Math.sin(frame*0.9)*1;
  ctx.fillStyle='rgba(120,210,255,.30)';
  ctx.fillRect((player.x-4-wob-power*0.5)|0,y0,8+wob*2+power,y1-y0);
  ctx.fillStyle='rgba(170,230,255,.7)';
  ctx.fillRect((player.x-2)|0,y0,5,y1-y0);
  ctx.fillStyle='#f4f4f8';
  ctx.fillRect((player.x-1)|0,y0,2,y1-y0);
  if(laserHit){
    disc(player.x,y0,3+Math.sin(frame*0.8)*1.2,'#f4f4f8');
    disc(player.x,y0,5+Math.sin(frame*0.5),'rgba(159,216,255,.4)');
  }
}
function drawPlayer(){
  if(player.hidden) return;
  if(player.inv>0&&frame%6<2) return; // respawn blink
  drawSprite(sprShip(),player.x,player.y,false);
  ctx.fillStyle=frame%4<2?'#ffe24a':'#ffb340';
  ctx.fillRect((player.x-1)|0,(player.y+6)|0,2,2+(frame%2));
  if(!laserActive&&fireCd>=TUNE.shotCd-1){
    disc(player.x+0.5,player.y-9,3,'rgba(159,216,255,.4)');
    ctx.fillStyle='#f4f4f8';
    ctx.fillRect((player.x-1)|0,(player.y-10)|0,3,3);
  }
  if(power>=4){
    const ob=Math.sin(frame*0.15);
    disc(player.x-11,player.y+2+ob,2,'#9fd8ff');
    disc(player.x+11,player.y+2-ob,2,'#9fd8ff');
    ctx.fillStyle='#f4f4f8';
    ctx.fillRect((player.x-11)|0,(player.y+2+ob)|0,1,1);
    ctx.fillRect((player.x+11)|0,(player.y+2-ob)|0,1,1);
  }
  if(laserActive){
    disc(player.x,player.y,3,'rgba(255,92,168,.5)');
    ctx.fillStyle='#f4f4f8';
    ctx.fillRect((player.x-1)|0,(player.y-1)|0,2,2);
  }
}
function drawEbul(){
  for(const b of ebul){
    const c=b.type===1?'#39c2ff':'#ff5ca8';
    const r=b.r;
    ctx.fillStyle='#0d0e18';
    ctx.fillRect((b.x-r-1)|0,(b.y-r-1)|0,r*2+2,r*2+2);
    if((b.t||9)<3){
      ctx.fillStyle='#f4f4f8';
      ctx.fillRect((b.x-r-1)|0,(b.y-r-1)|0,r*2+2,r*2+2);
    }
    ctx.fillStyle=c;
    ctx.fillRect((b.x-r)|0,(b.y-r)|0,r*2,r*2);
    ctx.fillStyle='#f4f4f8';
    ctx.fillRect((b.x-r+1)|0,(b.y-r+1)|0,r*2-2,r*2-2);
  }
}
function drawFx(){
  for(const p of parts){ ctx.fillStyle=p.c; ctx.fillRect(p.x|0,p.y|0,p.s,p.s); }
  for(const r of rings){
    ctx.strokeStyle=r.c; ctx.globalAlpha=Math.min(1,r.life/12);
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,TAU); ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(bombFx>0){
    const r=(80-bombFx)*3.4;
    ctx.strokeStyle='#9fd8ff'; ctx.lineWidth=3; ctx.globalAlpha=bombFx/80;
    ctx.beginPath(); ctx.arc(player.x,player.y,r,0,TAU); ctx.stroke();
    ctx.globalAlpha=1; ctx.lineWidth=1;
  }
  for(const p of pops){
    if(p.big){
      if(p.t%16<10) txt(p.txt,W/2,p.y,p.c,10,'center',true);
    } else {
      ctx.globalAlpha=Math.max(0.1,1-p.t/p.life);
      txt(p.txt,p.x|0,p.y|0,p.c,7,'center');
      ctx.globalAlpha=1;
    }
  }
}
function drawHUD(){
  txt('1P '+pad(Math.min(score,99999999),8),2,2,'#f4f4f8',7);
  txt('HI '+pad(hiscore,8),W-2,2,'#8b93b4',7,'right');
  if(loop===2) txt('LOOP 2',W/2,2,'#ff6b5e',7,'center',true);
  if(chain>1){
    txt(chain+' HIT',2,12,'#ffe24a',10+(chainPulse>0?3:0),'left',true);
    const gw=(44*gauge/GAUGE_MAX)|0;
    ctx.fillStyle='#22243a'; ctx.fillRect(2,24,44,3);
    ctx.fillStyle=gauge<30?'#ff6b5e':'#ffe24a'; ctx.fillRect(2,24,gw,3);
  }
  for(let i=0;i<Math.max(lives,0);i++)
    ctx.drawImage(sprShip(),3+i*11,H-11,9,8);
  const lx=3+Math.max(lives,0)*11+4;
  for(let i=0;i<power;i++){ ctx.fillStyle='#ffe24a'; ctx.fillRect(lx+i*5,H-8,3,3); }
  for(let i=0;i<bombs;i++){
    ctx.fillStyle='#7ee08a'; ctx.fillRect(W-9-i*8,H-10,6,6);
    ctx.fillStyle='#151726'; ctx.fillRect(W-8-i*8,H-9,4,4);
  }
  if(cheatUsed) txt('DEBUG'+(cheatInv?' INV':''),2,H-20,'#ff6b5e',7);
  if(pacifist&&stageFrame>300) txt('DOT EATER',2,H-29,'#5c637f',7);
  if(touchSeen&&state===S.PLAY){
    ctx.strokeStyle='#5c637f'; ctx.strokeRect(W-50,H-28,46,18);
    txt('BOMB',W-27,H-23,'#8b93b4',7,'center');
  }
  if(bossActive&&boss&&!boss.dying&&!boss.leaving&&boss.y>=boss.ty){
    const bw=W-20, ratio=clamp(boss.hp/boss.hpMax,0,1);
    ctx.fillStyle='#151726'; ctx.fillRect(10,10,bw,4);
    ctx.fillStyle=['#ff5ca8','#39c2ff','#ff6b5e','#f4f4f8'][boss.phase-1];
    ctx.fillRect(10,10,(bw*ratio)|0,4);
    txt(boss.kind===2?'KING LUCANUS':'QUEEN VESPA',W/2,16,'#8b93b4',7,'center');
    const sec=Math.max(0,Math.ceil(boss.pt/60));
    txt(''+sec,W-12,16,sec<=10?'#ff6b5e':'#8b93b4',7,'right');
  }
  if(warningT>0&&frame%20<11){
    ctx.fillStyle='rgba(255,59,59,.18)';
    ctx.fillRect(0,80,W,30); ctx.fillRect(0,200,W,30);
    txt('W A R N I N G',W/2,132,'#ff3b3b',18,'center',true);
  }
}
function drawStateOverlay(){
  if(state===S.TITLE){
    ctx.fillStyle='rgba(3,4,10,.55)'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(sprBee,(W/2-14)|0,26,28,22);
    txt('BLAZING',W/2+1,57,'#22243a',26,'center',true);
    txt('BLAZING',W/2,55,'#ff5ca8',26,'center',true);
    txt('CHAIN',W/2+1,86,'#22243a',26,'center',true);
    txt('CHAIN',W/2,84,'#39c2ff',26,'center',true);
    txt('A DODONPACHI STYLE BULLET HELL',W/2,122,'#8b93b4',7,'center');
    txt('ARROWS / WASD ... MOVE',W/2,150,'#f4f4f8',7,'center');
    txt('Z TAP ... SHOT    Z HOLD ... LASER',W/2,162,'#f4f4f8',7,'center');
    txt('X ... BOMB  C ... COIN  P ... PAUSE  M ... MUTE',W/2,174,'#f4f4f8',7,'center');
    txt('TOUCH: DRAG=MOVE  2ND FINGER=LASER',W/2,186,'#5c637f',7,'center');
    txt('YOUR HITBOX IS ONLY THE TINY DOT',W/2,204,'#ffe24a',7,'center');
    if(credits>0){
      if(frame%40<26) txt('PRESS Z OR TAP TO START',W/2,236,'#f4f4f8',9,'center',true);
    } else if(frame%30<18) txt('INSERT COIN  (PRESS C)',W/2,236,'#ffe24a',9,'center',true);
    if(typeBUnlocked){
      txt((shipType===0?'> ':'')+'TYPE-A',W/2-32,250,shipType===0?'#ff6b5e':'#5c637f',7,'center');
      txt((shipType===1?'> ':'')+'TYPE-B',W/2+32,250,shipType===1?'#7ee08a':'#5c637f',7,'center');
    }
    txt('HI-SCORE '+pad(hiscore,8),W/2,262,'#8b93b4',7,'center');
    txt('CREDITS '+credits,W/2,274,'#8b93b4',7,'center');
    ctx.strokeStyle='#5c637f'; ctx.strokeRect(W-54,H-24,48,18);
    txt('COIN',W-30,H-19,'#8b93b4',7,'center');
    txt('CHAIN KILLS TO MULTIPLY YOUR SCORE',W/2,286,'#5c637f',7,'center');
  } else if(state===S.CONT){
    ctx.fillStyle='rgba(3,4,10,.65)'; ctx.fillRect(0,0,W,H);
    txt('CONTINUE?',W/2,84,'#ffe24a',16,'center',true);
    const d=Math.max(0,(contT/60)|0);
    txt(''+d,W/2,112,(d<=3&&frame%10<5)?'#ff6b5e':'#f4f4f8',34,'center',true);
    if(credits>0){
      if(frame%30<20) txt('PRESS Z TO CONTINUE',W/2,184,'#f4f4f8',9,'center',true);
    } else if(frame%30<20) txt('INSERT COIN  (PRESS C)',W/2,184,'#ffe24a',9,'center',true);
    txt('CREDITS '+credits,W/2,204,'#8b93b4',7,'center');
    txt('SCORE RESETS  THE ONES DIGIT MARKS CONTINUES',W/2,222,'#5c637f',7,'center');
    txt('LOOP 2 NEEDS A ONE CREDIT CLEAR',W/2,234,'#5c637f',7,'center');
    ctx.strokeStyle='#5c637f'; ctx.strokeRect(W-54,H-24,48,18);
    txt('COIN',W-30,H-19,'#8b93b4',7,'center');
  } else if(state===S.OVER||state===S.WIN){
    ctx.fillStyle='rgba(3,4,10,.6)'; ctx.fillRect(0,0,W,H);
    const t1=state===S.WIN?'ALL CLEAR':'GAME OVER';
    const c1=state===S.WIN?'#7ee08a':'#ff6b5e';
    txt(t1,W/2,90,c1,20,'center',true);
    txt('SCORE  '+pad(score,8),W/2,140,'#f4f4f8',9,'center');
    txt('MAX CHAIN  '+chainMax+' HIT',W/2,158,'#ffe24a',9,'center');
    if(continuesUsed>0) txt('CONTINUES USED  '+continuesUsed,W/2,174,'#8b93b4',8,'center');
    if(score>=hiscore) txt('NEW HI-SCORE!',W/2,190,'#ff5ca8',9,'center',true);
    if(state===S.WIN&&trueClear) txt('KING LUCANUS PRIME DESTROYED',W/2,112,'#ff5ca8',8,'center');
    if(state===S.WIN&&!trueClear&&loopLocked)
      txt('A ONE CREDIT CLEAR UNLOCKS LOOP 2',W/2,204,'#5c637f',7,'center');
    if(state===S.WIN&&pacifist) txt('PACIFIST RUN',W/2,204,'#7ee08a',7,'center');
    if(frame%40<26) txt('PRESS Z FOR TITLE',W/2,220,'#f4f4f8',8,'center');
  }
  if(paused&&state===S.PLAY){
    ctx.fillStyle='rgba(3,4,10,.5)'; ctx.fillRect(0,0,W,H);
    txt('PAUSE',W/2,150,'#f4f4f8',14,'center',true);
  }
  if(flash>0){
    ctx.fillStyle='rgba(244,244,248,'+(flash/14)+')';
    ctx.fillRect(0,0,W,H);
  }
}

// ---------- main loop ----------
function jumpToBoss(){
  if(bossActive||!script.length) return;
  const bt=script[script.length-1].t;
  stageFrame=Math.max(stageFrame,bt-120);
  while(scriptI<script.length-1&&script[scriptI].t<=stageFrame) scriptI++;
  enemies=[]; ebul=[];
  warningT=90;
}
function applyCheats(){
  if(!cheatActive) return;
  cheatUsed=true;
  if(CHEAT.pow>=0) power=Math.min(4,CHEAT.pow);
  if(CHEAT.loop===2) loop=2;
  if(CHEAT.stage===2){
    stage=2; Object.assign(TARMAC,TARMAC_S2);
    stageFrame=0; scriptI=0; buildScript(2);
  }
  if(CHEAT.inv) cheatInv=true;
  if(CHEAT.boss) jumpToBoss();
}
function insertCoin(){ credits++; sfxCoin(); }
function advance(){
  if(state===S.TITLE){ if(credits>0){ credits--; resetGame(); } }
  else if(state===S.CONT){ if(credits>0){ credits--; continuesUsed++; doContinue(); } }
  else if(state===S.OVER||state===S.WIN){ state=S.TITLE; }
}
function doContinue(){
  score=Math.min(continuesUsed,9);   // ones digit marks the continues
  chain=0; chainMax=0; gauge=0;
  extendAt=ECON.extends.slice();
  lives=ECON.lives; bombs=ECON.bombs;
  loopLocked=true; pacifist=false;
  player.x=W/2; player.y=H+18; player.inv=150; player.hidden=false; player.entering=32;
  deathT=0; holdT=0; fireCd=0;
  state=S.PLAY;
  pops.push({x:W/2,y:140,t:0,life:90,txt:'CONTINUE',big:true,c:'#ffe24a'});
  blip(392,784,0.25,'square',0.25);
}
function startLoop2(){
  loop=2; stage=1;
  Object.assign(TARMAC,TARMAC_S1);
  stageFrame=0; scriptI=0; buildScript(1);
  warningT=0;
}
function resetGame(){
  score=0; lives=ECON.lives; bombs=ECON.bombs;
  chain=0; chainMax=0; gauge=0;
  extendAt=ECON.extends.slice();
  stage=1; Object.assign(TARMAC,TARMAC_S1);
  loop=1; continuesUsed=0; loopLocked=false; trueClear=false; pacifist=true;
  stageFrame=0; scriptI=0; buildScript(1);
  shots=[]; enemies=[]; ebul=[]; parts=[]; rings=[]; pops=[]; items=[];
  power=0; dropToggle=false;
  boss=null; bossActive=false; warningT=0; bombFx=0;
  deathT=0; holdT=0; fireCd=0; laserActive=false; laserHit=false;
  player={x:W/2,y:H+18,inv:150,hidden:false,entering:34};
  paused=false; laserSndOff();
  applyCheats();
  state=S.PLAY;
}
function tick(){
  frame++;
  if(freezeT>0){ freezeT--; return; }
  updateBg();
  if(state===S.PLAY&&!paused){
    stageFrame++;
    runScript();
    if(warningT>0){ warningT--; if(warningT%34===0) sfxWarn(); }
    updatePlayer();
    updateShots();
    updateEnemies();
    updateItems();
    updateBoss();
    updateEbul();
    if(state===S.PLAY) collide();
    updateChain();
  } else if(state===S.CONT){
    contT--;
    if(contT>0&&contT%60===0) blip(880,880,0.09,'square',0.28);
    if(contT<0) state=S.OVER;
  }
  updateFx();
}
function render(){
  ctx.save();
  if(shake>0) ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
  drawBg();
  if(state!==S.TITLE){
    drawShots();
    drawEnemies();
    drawBoss();
    drawItems();
    drawLaser();
    drawPlayer();
    drawEbul();
  }
  drawFx();
  ctx.restore();
  if(state!==S.TITLE) drawHUD();
  drawStateOverlay();
}
let last=0, acc=0; const STEP=1000/60;
function mainLoop(ts){
  requestAnimationFrame(mainLoop);
  if(!last) last=ts;
  let d=ts-last; last=ts;
  if(d>100) d=100;
  acc+=d;
  while(acc>=STEP){ acc-=STEP; tick(); }
  render();
}
addEventListener('pointerdown',e=>{ if(e.pointerType==='touch') touchSeen=true; });
addEventListener('pagehide',()=>saveHi(hiscore));
addEventListener('visibilitychange',()=>{ if(document.hidden) saveHi(hiscore); });
initBg();
requestAnimationFrame(mainLoop);
</script>
