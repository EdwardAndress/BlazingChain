  html,body{margin:0;height:100%;background:#000;overflow:hidden;touch-action:none;
    font-family:ui-monospace,Menlo,Consolas,monospace;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,#0a0b16 0%,#000 78%);}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#05060d;touch-action:none;}
  #scan{position:fixed;inset:0;pointer-events:none;opacity:.55;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.28) 2px 3px);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="240" height="320"></canvas></div>
<div id="scan"></div>
<script>
"use strict";
/* ============================================================
   BLAZING CHAIN - a single-file DoDonPachi-inspired bullet hell
   Keyboard: arrows / WASD move, Z tap = shot, Z hold = laser
   (focus, slow move), X = bomb, P = pause, M = mute.
   Touch: drag = move + autofire, second finger held = laser,
   BOMB button bottom right.
   ============================================================ */

const W=240, H=320;
const cv=document.getElementById('game');
const ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

// Tuning knobs - the feel lives here
const TUNE={
  shipSpd:2.3,       // normal move speed
  focusSpd:1.05,     // move speed while lasering
  shotCd:5,          // frames between shot volleys
  laserDps:1.15,     // laser damage per frame
  chainDrain:0.85,   // chain gauge drain per frame
  laserSustain:0.12, // drain while laser is biting an enemy
  hitR:1.5,          // player core hitbox radius (tiny, DDP style)
  bulletCap:900
};

function fitCanvas(){
  const s=Math.min(innerWidth/W, innerHeight/H);
  const sc=s>=1? Math.floor(s):s;
  cv.style.width=(W*sc)+'px'; cv.style.height=(H*sc)+'px';
}
addEventListener('resize',fitCanvas); fitCanvas();

// ---------- helpers ----------
const TAU=Math.PI*2;
const rnd=(a=1,b)=> b===undefined? Math.random()*a : a+Math.random()*(b-a);
const clamp=(v,a,b)=> v<a?a:v>b?b:v;
const dist2=(ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
const pad=(n,l)=>(''+n).padStart(l,'0');

function txt(s,x,y,c,size,align,bold){
  ctx.fillStyle=c||'#f4f4f8';
  ctx.font=(bold?'bold ':'')+(size||8)+'px monospace';
  ctx.textAlign=align||'left'; ctx.textBaseline='top';
  ctx.fillText(s,x,y);
}

// ---------- game state ----------
const S={TITLE:0,PLAY:1,OVER:2,WIN:3};
let state=S.TITLE, paused=false, frame=0, stageFrame=0;
let score=0, hiscore=100000, lives=2, bombs=3;
let chain=0, chainMax=0, gauge=0; const GAUGE_MAX=100;
let extendAt=[1000000,3000000];
let player={x:W/2,y:H-40,inv:0,hidden:false}, deathT=0;
let holdT=0, fireCd=0, laserActive=false, laserHit=false, laserEndY=0;
let shots=[], enemies=[], ebul=[], parts=[], rings=[], pops=[];
let boss=null, bossActive=false, warningT=0;
let bombFx=0, shake=0, flash=0;
let scriptI=0; const script=[];
let stars=[], ground=[];

// ---------- input ----------
const keys={};
addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if(e.repeat) return;
  keys[e.code]=true;
  bootAudio();
  if(e.code==='KeyM'){muted=!muted; if(muted) laserSndOff();}
  if(e.code==='KeyP'&&state===S.PLAY){paused=!paused; if(paused) laserSndOff();}
  if(state!==S.PLAY&&(e.code==='KeyZ'||e.code==='Enter')) resetGame();
});
addEventListener('keyup',e=>{keys[e.code]=false;});
addEventListener('contextmenu',e=>e.preventDefault());

// touch: pointer 1 drags the ship (autofire), pointer 2 held = laser
const touches=new Map();
let accDX=0, accDY=0, touchFire=false, touchLaser=false, bombTapped=false;
function toGame(e){
  const r=cv.getBoundingClientRect();
  return {x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H};
}
function refreshTouchFlags(){
  touchFire=false; touchLaser=false;
  for(const t of touches.values()){
    if(t.role==='move') touchFire=true;
    if(t.role==='laser') touchLaser=true;
  }
}
addEventListener('pointerdown',e=>{
  bootAudio();
  if(state!==S.PLAY){resetGame(); return;}
  const p=toGame(e);
  if(p.x>W-52&&p.y>H-30){bombTapped=true; return;}
  touches.set(e.pointerId, touches.size===0
    ? {role:'move',lx:p.x,ly:p.y}
    : {role:'laser'});
  refreshTouchFlags();
  e.preventDefault();
});
addEventListener('pointermove',e=>{
  const t=touches.get(e.pointerId);
  if(!t||t.role!=='move') return;
  const p=toGame(e);
  accDX+=(p.x-t.lx)*1.15; accDY+=(p.y-t.ly)*1.15;
  t.lx=p.x; t.ly=p.y;
});
function dropTouch(e){touches.delete(e.pointerId); refreshTouchFlags();}
addEventListener('pointerup',dropTouch);
addEventListener('pointercancel',dropTouch);

// ---------- audio (tiny webaudio synth) ----------
let AC=null, masterGain=null, muted=false, laserNode=null, shotSfxCd=0;
function bootAudio(){
  if(AC) return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=AC.createGain(); masterGain.gain.value=0.16;
    masterGain.connect(AC.destination);
  }catch(err){}
}
function blip(f0,f1,dur,type,vol){
  if(!AC||muted) return;
  const t=AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square';
  o.frequency.setValueAtTime(f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(30,f1),t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(vol||0.4,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t+dur+0.05);
}
function noiseHit(dur,vol,dark){
  if(!AC||muted) return;
  const t=AC.currentTime, len=(AC.sampleRate*dur)|0;
  const buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(); src.buffer=buf;
  const g=AC.createGain();
  g.gain.setValueAtTime(vol||0.4,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  let node=src;
  if(dark){const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=650; src.connect(f); node=f;}
  node.connect(g); g.connect(masterGain); src.start(t);
}
function sfxShot(){ if(shotSfxCd>0)return; shotSfxCd=3; blip(880,320,0.045,'square',0.10); }
function sfxHit(){ noiseHit(0.03,0.08); }
function sfxBoom(){ noiseHit(0.22,0.35,true); blip(220,50,0.2,'triangle',0.3); }
function sfxBoomBig(){ noiseHit(0.5,0.55,true); blip(160,32,0.5,'triangle',0.45); }
function sfxBomb(){ blip(70,700,0.5,'sawtooth',0.4); noiseHit(0.6,0.5,true); }
function sfxWarn(){ blip(680,680,0.16,'square',0.25); blip(510,510,0.16,'square',0.25); }
function sfxPhase(){ blip(140,60,0.35,'sawtooth',0.4); noiseHit(0.3,0.4,true); }
function laserSndOn(){
  if(!AC||muted||laserNode) return;
  const o=AC.createOscillator(), g=AC.createGain(), l=AC.createOscillator(), lg=AC.createGain();
  o.type='sawtooth'; o.frequency.value=72;
  l.frequency.value=21; lg.gain.value=26;
  l.connect(lg); lg.connect(o.frequency);
  g.gain.value=0.09; o.connect(g); g.connect(masterGain);
  o.start(); l.start();
  laserNode={o,g,l};
}
function laserSndOff(){
  if(!laserNode) return;
  const t=AC.currentTime;
  laserNode.g.gain.setTargetAtTime(0,t,0.03);
  laserNode.o.stop(t+0.15); laserNode.l.stop(t+0.15);
  laserNode=null;
}

// ---------- pixel sprites ----------
const PAL={r:'#d92b2b',R:'#ff6b5e',o:'#ffb340',w:'#f4f4f8',c:'#9fd8ff',d:'#22243a',
  g:'#5c637f',G:'#8b93b4',e:'#3fae5a',E:'#7ee08a',k:'#151726',y:'#ffe24a',
  p:'#ff5ca8',b:'#39c2ff'};
function sprite(rows){
  const h=rows.length, w=rows[0].length;
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const g=c.getContext('2d');
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const k=rows[y][x];
    if(k!=='.'){g.fillStyle=PAL[k]; g.fillRect(x,y,1,1);}
  }
  return c;
}
const sprPlayer=sprite([
'......w......',
'.....dRd.....',
'.....rRr.....',
'....drRrd....',
'.d..rcRcr..d.',
'.rd.rcRcr.dr.',
'.rrdrrRrrdrr.',
'wrRrrdRdrrRrw',
'.rr.drrrd.rr.',
'.d...rRr...d.',
'.....d.d.....']);
const sprBee=sprite([
'...eEe...',
'..eEEEe..',
'.kEeeeEk.',
'eEeEEEeEe',
'.kEeeeEk.',
'..eEEEe..',
'...eke...']);
const sprHeli=sprite([
'.....GgG.....',
'..gGGgggGGg..',
'.GgggEEEgggG.',
'GggEEkkkEEggG',
'.GgggEEEgggG.',
'..gGGgggGGg..',
'.....GgG.....',
'......g......']);
const sprTank=sprite([
'..gGGGGGGGGGg..',
'.gGgggggggggGg.',
'gGggkkkkkkkggGg',
'gGgkgggggggkgGg',
'gGgkgGGpGGgkgGg',
'gGgkgGpppGgkgGg',
'gGgkgGGpGGgkgGg',
'gGgkgggggggkgGg',
'gGggkkkkkkkggGg',
'.gGgggggggggGg.',
'..gGGGGGGGGGg..']);
const sprSpin=sprite([
'....bbb....',
'..bkbpbkb..',
'.bkppwppkb.',
'bbpwwpwwpbb',
'.bkppwppkb.',
'..bkbpbkb..',
'....bbb....']);

// ---------- enemy bullets & patterns ----------
function eb(x,y,ang,spd,type,r){
  if(ebul.length>=TUNE.bulletCap) return;
  ebul.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,type:type||0,r:r||2});
}
function aimAng(x,y){ return Math.atan2(player.y-y, player.x-x); }
function ring(x,y,n,spd,off,type){ for(let i=0;i<n;i++) eb(x,y,(off||0)+i/n*TAU,spd,type===undefined?1:type); }
function fan(x,y,n,spread,spd,type){
  const a=aimAng(x,y);
  for(let i=0;i<n;i++) eb(x,y,a+(i-(n-1)/2)*spread,spd,type||0);
}

// ---------- enemy spawns ----------
function spawnBee(x,dir){ enemies.push({k:'bee',x,y:-8,vx:0,dir,t:0,hp:1,sc:100,r:4,fired:false}); }
function spawnRain(x){ enemies.push({k:'rain',x,y:-8,t:0,hp:1,sc:80,r:4,fired:Math.random()<0.5}); }
function spawnHeli(side,y){ enemies.push({k:'heli',x:side<0?-10:W+10,y,side,t:0,hp:4,sc:300,r:6}); }
function spawnTank(x){ enemies.push({k:'tank',x,y:-14,t:0,hp:26,sc:1500,r:8}); }
function spawnSpin(x,ty){ enemies.push({k:'spin',x,y:-10,ty,t:0,hp:18,sc:1200,r:6,a:rnd(TAU)}); }
function spawnMid(){ enemies.push({k:'mid',x:W/2,y:-30,t:0,hp:260,sc:10000,r:15,a:0}); }

// ---------- enemy behaviour ----------
function updateEnemies(){
  for(const e of enemies){
    e.t++;
    if(e.flash>0)e.flash--;
    switch(e.k){
      case 'bee':
        e.y+=1.4;
        if(e.t>26){ e.vx=Math.min(1.15,e.vx+0.035); }
        e.x+=e.vx*e.dir;
        if(!e.fired&&e.y>70){ e.fired=true; eb(e.x,e.y,aimAng(e.x,e.y),1.5); }
        if(e.y>H+10||e.x<-14||e.x>W+14) e.dead=true;
        break;
      case 'rain':
        e.y+=2.1; e.x+=Math.sin(e.t*0.12)*0.35;
        if(!e.fired&&e.y>60){ e.fired=true; eb(e.x,e.y,aimAng(e.x,e.y),1.2); }
        if(e.y>H+10) e.dead=true;
        break;
      case 'heli':
        e.x+=e.side*0.95;
        e.y+=Math.sin(e.t*0.05)*0.5;
        if(e.t>30&&e.t%70===0) fan(e.x,e.y,3,0.3,1.35);
        if(e.x<-16||e.x>W+16) e.dead=true;
        break;
      case 'tank':
        if(e.y<64) e.y+=0.6;
        else if(e.t<460){
          if(e.t%96===0) ring(e.x,e.y,10,1.05,rnd(TAU));
          if(e.t%56===20){
            const a=aimAng(e.x,e.y);
            eb(e.x,e.y,a-0.1,1.8); eb(e.x,e.y,a+0.1,1.8);
          }
        } else e.y+=0.7;
        if(e.y>H+16) e.dead=true;
        break;
      case 'spin':
        if(e.y<e.ty) e.y+=0.8;
        else if(e.t<300){
          if(e.t%4===0){ eb(e.x,e.y,e.a,1.3,1); e.a+=0.47; }
        } else e.y-=1.2;
        if(e.y<-14) e.dead=true;
        break;
      case 'mid':
        if(e.y<62) e.y+=0.5;
        else if(e.t<1000){
          e.x=W/2+Math.sin(e.t*0.02)*30;
          if(e.t%92===0) ring(e.x,e.y+8,14,1.1,rnd(TAU));
          if(e.t%64===30) fan(e.x,e.y+10,5,0.2,1.55);
          if(e.hp<100&&e.t%5===0){ eb(e.x,e.y+10,e.a,1.25,1); e.a+=0.33; }
        } else e.y-=0.8;
        if(e.y<-34) e.dead=true;
        break;
    }
  }
  enemies=enemies.filter(e=>!e.dead);
}

// ---------- boss: QUEEN VESPA ----------
const BOSS_HP=[900,900,850];
function spawnBoss(){
  bossActive=true;
  boss={x:W/2,y:-70,ty:56,t:0,phase:1,hp:BOSS_HP[0],hpMax:BOSS_HP[0],
    inv:0,sway:0,dmgFlash:0,dying:0,podFlash:0};
}
function bossPhaseUp(){
  boss.phase++;
  if(boss.phase>3){ startBossDeath(); return; }
  boss.hp=BOSS_HP[boss.phase-1]; boss.hpMax=boss.hp;
  boss.inv=80; boss.t=0; boss.sway=0;
  clearBulletsToSparks(); sfxPhase(); shake+=6;
}
function startBossDeath(){
  boss.dying=170; clearBulletsToSparks(); laserSndOff();
}
function updateBoss(){
  if(!boss) return;
  if(boss.dmgFlash>0) boss.dmgFlash--;
  if(boss.podFlash>0) boss.podFlash--;
  if(boss.dying>0){
    boss.dying--;
    if(boss.dying%6===0) boomAt(boss.x+rnd(-46,46), boss.y+rnd(-26,30), 1);
    shake=Math.max(shake,2.5);
    if(boss.dying===0){
      boomAt(boss.x,boss.y,4); flash=12;
      rings.push({x:boss.x,y:boss.y,r:4,vr:3.2,life:40,c:'#f4f4f8'});
      const bonus=100000+chainMax*500;
      score+=bonus; if(score>hiscore)hiscore=score;
      pops.push({x:W/2,y:150,t:0,life:130,txt:'BONUS '+bonus,big:true,c:'#ffe24a'});
      sfxBoomBig();
      boss=null; bossActive=false;
      state=S.WIN; laserSndOff();
    }
    return;
  }
  if(boss.y<boss.ty){ boss.y+=0.8; return; }
  boss.t++;
  boss.x=W/2+Math.sin(boss.t*0.008)*(boss.phase===2?46:26);
  if(boss.inv>0){ boss.inv--; return; }
  const t=boss.t, sx=boss.x, nose=boss.y+38, podY=boss.y+2;
  if(boss.phase===1){
    if(t%110===0){ fan(sx,nose,5,0.2,1.45); boss.podFlash=6; }
    if(t%110===55) fan(sx,nose,6,0.17,1.7);
    if(t%150===40){ ring(sx-40,podY,9,1.1,rnd(TAU)); ring(sx+40,podY,9,1.1,rnd(TAU)); boss.podFlash=6; }
    if(t%46===0){ const px=t%92===0?sx-40:sx+40; eb(px,podY,aimAng(px,podY),2.0); }
  } else if(boss.phase===2){
    if(t%5===0){ eb(sx,nose,boss.sway,1.3,1); eb(sx,nose,boss.sway+Math.PI,1.3,1); boss.sway+=0.21; }
    if(t%120===0){ fan(sx,nose,3,0.14,2.2); boss.podFlash=6; }
    if(t%90===45){ eb(sx-40,podY,aimAng(sx-40,podY),1.8); eb(sx+40,podY,aimAng(sx+40,podY),1.8); }
  } else {
    if(t%84===0){ ring(sx,boss.y+10,18,1.05,rnd(TAU)); boss.podFlash=6; }
    if(t%160===80){
      const gap=30+rnd(W-60);
      for(let x=8;x<W;x+=9) if(Math.abs(x-gap)>20) ebul.push({x,y:boss.y+30,vx:0,vy:1.3,type:0,r:2});
    }
    const step=boss.hp<300?4:6;
    if(t%step===0){ eb(sx,nose,boss.sway,1.4); boss.sway+=0.29; }
    if(t%130===65) fan(sx,nose,5,0.22,1.75);
  }
}

// ---------- stage script ----------
function at(sec,f){ script.push({t:(sec*60)|0,f}); }
function wave(t0,n,gap,f){ for(let i=0;i<n;i++) at(t0+i*gap,(idx=>()=>f(idx))(i)); }
function announce(t){ pops.push({x:W/2,y:120,t:0,life:110,txt:t,big:true,c:'#f4f4f8'}); }
function buildScript(){
  script.length=0;
  at(0.7,()=>announce('STAGE 1  START'));
  wave(1.5,5,0.22,i=>spawnBee(40+i*4,1));
  wave(3.2,5,0.22,i=>spawnBee(W-40-i*4,-1));
  wave(5.2,8,0.2,i=>spawnBee(i%2?50:W-50,i%2?1:-1));
  at(8,()=>spawnHeli(-1,56)); at(9.5,()=>spawnHeli(1,84));
  wave(11.5,6,0.16,i=>spawnRain(W/2-30+i*12));
  at(13.5,()=>spawnTank(70));
  wave(16,10,0.24,i=>spawnBee(i%2?36:W-36,i%2?1:-1));
  at(20,()=>{spawnHeli(-1,64);spawnHeli(1,64);});
  wave(21,6,0.16,i=>spawnRain(30+i*10));
  wave(21.4,6,0.16,i=>spawnRain(W-30-i*10));
  at(24.5,()=>spawnTank(W-70));
  wave(26,8,0.22,i=>spawnBee(40+i*3,1));
  at(29.5,()=>spawnSpin(W/2,60));
  wave(32,16,0.18,i=>spawnBee(i%2?30+i*2:W-30-i*2,i%2?1:-1));
  at(38,()=>{spawnHeli(-1,50);spawnHeli(1,90);});
  at(40,()=>spawnSpin(60,70)); at(41,()=>spawnSpin(W-60,54));
  at(45,()=>{spawnTank(60);spawnTank(W-60);});
  wave(47,8,0.15,i=>spawnRain(20+i*28));
  wave(52,20,0.13,i=>spawnRain(20+((i*53)%200)));
  at(57,()=>spawnSpin(W/2,80));
  at(58,()=>{spawnHeli(1,60);spawnHeli(-1,100);});
  at(63,()=>announce('LARGE CRAFT APPROACHING'));
  at(64,()=>spawnMid());
  wave(70,10,0.3,i=>spawnBee(i%2?44:W-44,i%2?1:-1));
  wave(80,12,0.2,i=>spawnBee(30+i*15,(i%2)*2-1));
  at(88,()=>{warningT=200;});
  at(91.8,()=>spawnBoss());
  script.sort((a,b)=>a.t-b.t);
}
function runScript(){
  while(scriptI<script.length&&script[scriptI].t<=stageFrame) script[scriptI++].f();
}

// ---------- player ----------
let xLatch=false, touchSeen=false;
function updatePlayer(){
  if(deathT>0){
    deathT--;
    if(deathT===0&&lives>=0){
      player.x=W/2; player.y=H-36; player.inv=150; player.hidden=false;
    }
    return;
  }
  if(player.hidden) return;
  const p=player;
  const firing=keys.KeyZ||keys.Space||touchFire||touchLaser;
  holdT=firing?holdT+1:0;
  const laser=touchLaser||(holdT>14&&(keys.KeyZ||keys.Space));
  const spd=laser?TUNE.focusSpd:TUNE.shipSpd;
  let dx=(keys.ArrowRight||keys.KeyD?1:0)-(keys.ArrowLeft||keys.KeyA?1:0);
  let dy=(keys.ArrowDown||keys.KeyS?1:0)-(keys.ArrowUp||keys.KeyW?1:0);
  if(dx&&dy){dx*=0.7071;dy*=0.7071;}
  p.x=clamp(p.x+dx*spd+accDX,6,W-6);
  p.y=clamp(p.y+dy*spd+accDY,14,H-8);
  accDX=0; accDY=0;
  laserActive=laser&&firing;
  if(laserActive) laserSndOn(); else laserSndOff();
  if(firing&&!laserActive&&fireCd<=0){ fireShot(); fireCd=TUNE.shotCd; }
  if(fireCd>0) fireCd--;
  const wantBomb=keys.KeyX||bombTapped;
  if(wantBomb&&!xLatch&&bombs>0&&bombFx<=0){ triggerBomb(); }
  xLatch=!!keys.KeyX;
  bombTapped=false;
  if(p.inv>0) p.inv--;
}
function fireShot(){
  const p=player; sfxShot();
  shots.push(
    {x:p.x-3,y:p.y-7,vx:0,vy:-6},
    {x:p.x+3,y:p.y-7,vx:0,vy:-6},
    {x:p.x-6,y:p.y-3,vx:-0.6,vy:-5.8},
    {x:p.x+6,y:p.y-3,vx:0.6,vy:-5.8});
}
function triggerBomb(){
  bombs--; bombFx=80;
  player.inv=Math.max(player.inv,150);
  sfxBomb(); flash=8; shake=Math.max(shake,9);
  clearBulletsToSparks();
}
function die(){
  if(player.inv>0||player.hidden) return;
  lives--;
  boomAt(player.x,player.y,3); sfxBoomBig(); laserSndOff();
  chain=0; gauge=0; bombs=3;
  player.hidden=true; deathT=70;
  clearBulletsToSparks();
  if(lives<0){
    if(score>hiscore) hiscore=score;
    state=S.OVER;
  }
}
function clearBulletsToSparks(){
  for(let i=0;i<ebul.length;i++){
    const b=ebul[i];
    if(i%2===0) spark(b.x,b.y,'#9fd8ff',2);
    score+=10;
  }
  ebul.length=0;
}

// ---------- combat resolution ----------
function killEnemy(e){
  e.dead=true;
  const mult=Math.min(chain+1,300);
  const val=e.sc*mult;
  score+=val;
  chain++; if(chain>chainMax)chainMax=chain;
  gauge=GAUGE_MAX;
  pops.push({x:e.x,y:e.y,t:0,life:40,txt:val>=10000?((val/1000)|0)+'K':''+val,c:'#ffe24a'});
  boomAt(e.x,e.y,e.r>10?2.5:(e.r>6?1.6:1));
  if(chain%10===0) blip(500+chain*3,900,0.07,'square',0.18);
}
function collide(){
  laserHit=false; laserEndY=0;
  // laser beam: bites the closest thing directly ahead
  if(laserActive&&!player.hidden){
    const bw=5;
    let target=null, bestY=-1, isBoss=false;
    for(const e of enemies){
      if(e.y<player.y-3&&Math.abs(e.x-player.x)<bw+e.r&&e.y>bestY){
        bestY=e.y; target=e; isBoss=false;
      }
    }
    if(bossActive&&boss&&!boss.dying&&boss.y>0){
      const by=boss.y+30;
      if(by<player.y-3&&Math.abs(boss.x-player.x)<bw+46&&by>bestY){
        bestY=by; target=boss; isBoss=true;
      }
    }
    if(target){
      laserHit=true; laserEndY=bestY-(isBoss?26:target.r);
      if(isBoss){
        if(boss.inv<=0){ boss.hp-=TUNE.laserDps; boss.dmgFlash=2; if(boss.hp<=0) bossPhaseUp(); }
      } else {
        target.hp-=TUNE.laserDps; target.flash=2;
        if(target.hp<=0) killEnemy(target);
      }
      if(frame%3===0) spark(player.x+rnd(-3,3),laserEndY,'#9fd8ff',2);
    }
  }
  // player shots
  for(const s of shots){
    if(bossActive&&boss&&!boss.dying&&
       Math.abs(s.x-boss.x)<46&&Math.abs(s.y-boss.y)<30){
      s.dead=true;
      if(boss.inv<=0){ boss.hp-=1; boss.dmgFlash=2; sfxHit(); if(boss.hp<=0) bossPhaseUp(); }
      continue;
    }
    for(const e of enemies){
      if(e.dead) continue;
      if(dist2(s.x,s.y,e.x,e.y)<(e.r+2)*(e.r+2)){
        s.dead=true; e.hp-=1; e.flash=3; sfxHit();
        spark(s.x,s.y,'#ffe24a',1);
        if(e.hp<=0) killEnemy(e);
        break;
      }
    }
  }
  shots=shots.filter(s=>!s.dead);
  enemies=enemies.filter(e=>!e.dead);
  // bomb burn
  if(bombFx>0){
    for(const e of enemies){
      e.hp-=0.5; e.flash=2;
      if(e.hp<=0&&!e.dead) killEnemy(e);
    }
    enemies=enemies.filter(e=>!e.dead);
    if(bossActive&&boss&&!boss.dying&&boss.inv<=0){
      boss.hp-=0.35; boss.dmgFlash=1;
      if(boss.hp<=0) bossPhaseUp();
    }
  }
  // things that kill the player
  if(!player.hidden&&player.inv<=0&&deathT===0){
    for(const b of ebul){
      const hr=TUNE.hitR+b.r*0.8;
      if(dist2(b.x,b.y,player.x,player.y)<hr*hr){ die(); return; }
    }
    for(const e of enemies){
      const hr=e.r+3;
      if(dist2(e.x,e.y,player.x,player.y)<hr*hr){ die(); return; }
    }
    if(bossActive&&boss&&!boss.dying&&
       Math.abs(player.x-boss.x)<44&&Math.abs(player.y-boss.y)<28) die();
  }
}
function updateChain(){
  if(chain>0){
    gauge-=laserHit?TUNE.laserSustain:TUNE.chainDrain;
    if(gauge<=0){ gauge=0; chain=0; }
  }
  if(extendAt.length&&score>=extendAt[0]){
    extendAt.shift(); lives++;
    pops.push({x:W/2,y:140,t:0,life:110,txt:'EXTEND!',big:true,c:'#7ee08a'});
    blip(520,1040,0.3,'square',0.3);
  }
  if(score>hiscore) hiscore=score;
}

// ---------- movement of simple things ----------
function updateShots(){
  for(const s of shots){ s.x+=s.vx; s.y+=s.vy; if(s.y<-6) s.dead=true; }
  shots=shots.filter(s=>!s.dead);
}
function updateEbul(){
  for(const b of ebul){ b.x+=b.vx; b.y+=b.vy; }
  ebul=ebul.filter(b=>b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);
  if(bombFx>30&&ebul.length){ clearBulletsToSparks(); }
}

// ---------- particles ----------
function spark(x,y,c,n){
  for(let i=0;i<n;i++){
    if(parts.length>420) return;
    const a=rnd(TAU), v=rnd(0.4,1.6);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:14+rnd(10),c,s:1});
  }
}
function boomAt(x,y,size){
  const cols=['#ffe24a','#ffb340','#ff6b5e','#f4f4f8'];
  const n=Math.min(10+size*10,60);
  for(let i=0;i<n;i++){
    if(parts.length>420) break;
    const a=rnd(TAU), v=rnd(0.5,1.6+size);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      life:16+rnd(12)+size*4,c:cols[(Math.random()*cols.length)|0],s:size>2?2:1});
  }
  rings.push({x,y,r:2,vr:0.9+size*0.5,life:14+size*5,c:'#ffb340'});
  shake=Math.max(shake,size*1.6);
  if(size>=2.5) sfxBoomBig(); else sfxBoom();
}
function updateFx(){
  for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; p.life--; }
  parts=parts.filter(p=>p.life>0);
  for(const r of rings){ r.r+=r.vr; r.life--; }
  rings=rings.filter(r=>r.life>0);
  for(const p of pops){ p.t++; if(!p.big) p.y-=0.4; }
  pops=pops.filter(p=>p.t<p.life);
  if(shotSfxCd>0) shotSfxCd--;
  if(bombFx>0) bombFx--;
  if(flash>0) flash--;
  shake*=0.86; if(shake<0.3) shake=0;
}

// ---------- background ----------
function initBg(){
  stars=[]; ground=[];
  for(let i=0;i<46;i++)
    stars.push({x:rnd(W),y:rnd(H),v:i<28?0.35:0.8,c:i<28?'#1d2340':'#3a4470'});
  for(let i=0;i<22;i++)
    ground.push({x:rnd(W),y:rnd(H),w:rnd(14,50),h:rnd(8,30),
      c:['#0a101c','#0c1626','#081418','#0d1220'][i%4]});
}
function updateBg(){
  for(const s of stars){ s.y+=s.v; if(s.y>H){ s.y=-2; s.x=rnd(W); } }
  for(const g of ground){ g.y+=0.55; if(g.y>H){ g.y=-g.h-rnd(20); g.x=rnd(W); g.w=rnd(14,50); g.h=rnd(8,30); } }
}

// ---------- drawing ----------
function disc(x,y,r,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill(); }
function drawBg(){
  ctx.fillStyle='#05060d'; ctx.fillRect(0,0,W,H);
  for(const g of ground){ ctx.fillStyle=g.c; ctx.fillRect(g.x|0,g.y|0,g.w,g.h); }
  for(const s of stars){ ctx.fillStyle=s.c; ctx.fillRect(s.x|0,s.y|0,1,1); }
}
function drawShots(){
  ctx.fillStyle='#bfe9ff';
  for(const s of shots) ctx.fillRect((s.x-1)|0,s.y|0,2,5);
}
function drawSprite(spr,x,y,fl,wOv,hOv){
  const w=wOv||spr.width, h=hOv||spr.height;
  ctx.drawImage(spr,(x-w/2)|0,(y-h/2)|0,w,h);
  if(fl){ ctx.fillStyle='rgba(255,255,255,.75)'; ctx.fillRect((x-w/2)|0,(y-h/2)|0,w,h); }
}
function drawEnemies(){
  for(const e of enemies){
    switch(e.k){
      case 'bee': case 'rain':
        drawSprite(sprBee,e.x,e.y,e.flash>0); break;
      case 'heli':
        drawSprite(sprHeli,e.x,e.y,e.flash>0);
        ctx.fillStyle='#c6cde6';
        const rw=frame%4<2?16:9;
        ctx.fillRect((e.x-rw/2)|0,(e.y-6)|0,rw,1);
        break;
      case 'tank':
        drawSprite(sprTank,e.x,e.y,e.flash>0); break;
      case 'spin':
        drawSprite(sprSpin,e.x,e.y,e.flash>0);
        if(frame%6<3) disc(e.x,e.y,2,'#f4f4f8');
        break;
      case 'mid':
        drawSprite(sprTank,e.x,e.y,e.flash>0,30,22); break;
    }
  }
}
function drawBoss(){
  if(!boss) return;
  const bx=boss.x, by=boss.y, ph=boss.phase;
  const coreCol=['#ff5ca8','#39c2ff','#ff6b5e'][Math.min(ph,3)-1];
  // wings
  const wa=frame%6<3?0.28:0.14;
  ctx.fillStyle='rgba(159,216,255,'+wa+')';
  ctx.fillRect(bx-72,by-14,36,12); ctx.fillRect(bx+36,by-14,36,12);
  ctx.fillRect(bx-62,by,26,9); ctx.fillRect(bx+36,by,26,9);
  // abdomen (striped, points at the player)
  const rows=[[54,'#1c1e2b',8],[48,'#e6b93a',14],[40,'#1c1e2b',20],[30,'#e6b93a',26],[18,'#1c1e2b',32]];
  for(const r of rows){ ctx.fillStyle=r[1]; ctx.fillRect((bx-r[0]/2)|0,by+r[2],r[0],6); }
  ctx.fillStyle='#8b93b4';
  ctx.beginPath(); ctx.moveTo(bx-7,by+38); ctx.lineTo(bx+7,by+38); ctx.lineTo(bx,by+47); ctx.fill();
  disc(bx,by+40,2,coreCol); // stinger cannon glow
  // thorax
  ctx.fillStyle='#3a3f52'; ctx.fillRect(bx-35,by-12,70,24);
  ctx.fillStyle='#2a2e40'; ctx.fillRect(bx-31,by-8,62,16);
  ctx.fillStyle='#5c637f';
  for(let i=-3;i<=3;i++) ctx.fillRect(bx+i*9-1,by-11,2,2);
  // pods
  disc(bx-40,by+2,7,'#5c637f'); disc(bx+40,by+2,7,'#5c637f');
  disc(bx-40,by+2,4,'#22243a'); disc(bx+40,by+2,4,'#22243a');
  if(boss.podFlash>0){ disc(bx-40,by+2,3,'#f4f4f8'); disc(bx+40,by+2,3,'#f4f4f8'); }
  // head + eyes + antennae
  ctx.fillStyle='#2a2e40'; ctx.fillRect(bx-14,by-24,28,12);
  ctx.fillStyle='#ff3b3b';
  ctx.fillRect(bx-9,by-21,4,4); ctx.fillRect(bx+5,by-21,4,4);
  ctx.strokeStyle='#5c637f'; ctx.lineWidth=1; ctx.beginPath();
  ctx.moveTo(bx-6,by-24); ctx.lineTo(bx-12,by-32);
  ctx.moveTo(bx+6,by-24); ctx.lineTo(bx+12,by-32); ctx.stroke();
  // core
  const cr=6+Math.sin(frame*0.2)*1.5;
  disc(bx,by,cr+2,'rgba(255,255,255,.15)');
  disc(bx,by,cr,coreCol);
  disc(bx,by,cr-3,'#f4f4f8');
  if(boss.inv>0&&frame%4<2){
    ctx.strokeStyle='#9fd8ff'; ctx.beginPath(); ctx.arc(bx,by,54,0,TAU); ctx.stroke();
  }
  if(boss.dmgFlash>0){
    ctx.fillStyle='rgba(255,255,255,.45)'; ctx.fillRect(bx-52,by-28,104,78);
  }
}
function drawLaser(){
  if(!laserActive||player.hidden) return;
  const y0=laserEndY, y1=player.y-7;
  if(y1<=y0) return;
  const wob=Math.sin(frame*0.9)*1;
  ctx.fillStyle='rgba(120,210,255,.30)';
  ctx.fillRect((player.x-4-wob)|0,y0,8+wob*2,y1-y0);
  ctx.fillStyle='rgba(170,230,255,.7)';
  ctx.fillRect((player.x-2)|0,y0,5,y1-y0);
  ctx.fillStyle='#f4f4f8';
  ctx.fillRect((player.x-1)|0,y0,2,y1-y0);
  if(laserHit){
    disc(player.x,y0,3+Math.sin(frame*0.8)*1.2,'#f4f4f8');
    disc(player.x,y0,5+Math.sin(frame*0.5),'rgba(159,216,255,.4)');
  }
}
function drawPlayer(){
  if(player.hidden) return;
  if(player.inv>0&&frame%6<2) return; // respawn blink
  drawSprite(sprPlayer,player.x,player.y,false);
  ctx.fillStyle=frame%4<2?'#ffe24a':'#ffb340';
  ctx.fillRect((player.x-1)|0,(player.y+6)|0,2,2+(frame%2));
  if(laserActive){
    disc(player.x,player.y,3,'rgba(255,92,168,.5)');
    ctx.fillStyle='#f4f4f8';
    ctx.fillRect((player.x-1)|0,(player.y-1)|0,2,2);
  }
}
function drawEbul(){
  for(const b of ebul){
    const c=b.type===1?'#39c2ff':'#ff5ca8';
    const r=b.r;
    ctx.fillStyle=c;
    ctx.fillRect((b.x-r)|0,(b.y-r)|0,r*2,r*2);
    ctx.fillStyle='#f4f4f8';
    ctx.fillRect((b.x-r+1)|0,(b.y-r+1)|0,r*2-2,r*2-2);
  }
}
function drawFx(){
  for(const p of parts){ ctx.fillStyle=p.c; ctx.fillRect(p.x|0,p.y|0,p.s,p.s); }
  for(const r of rings){
    ctx.strokeStyle=r.c; ctx.globalAlpha=Math.min(1,r.life/12);
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,TAU); ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(bombFx>0){
    const r=(80-bombFx)*3.4;
    ctx.strokeStyle='#9fd8ff'; ctx.lineWidth=3; ctx.globalAlpha=bombFx/80;
    ctx.beginPath(); ctx.arc(player.x,player.y,r,0,TAU); ctx.stroke();
    ctx.globalAlpha=1; ctx.lineWidth=1;
  }
  for(const p of pops){
    if(p.big){
      if(p.t%16<10) txt(p.txt,W/2,p.y,p.c,10,'center',true);
    } else {
      txt(p.txt,p.x|0,p.y|0,p.c,7,'center');
    }
  }
}

// ---------- main loop ----------
function resetGame(){
  score=0; lives=2; bombs=3;
  chain=0; chainMax=0; gauge=0;
  extendAt=[1000000,3000000];
  stageFrame=0; scriptI=0; buildScript();
  shots=[]; enemies=[]; ebul=[]; parts=[]; rings=[]; pops=[];
  boss=null; bossActive=false; warningT=0; bombFx=0;
  deathT=0; holdT=0; fireCd=0; laserActive=false; laserHit=false;
  player={x:W/2,y:H-40,inv:120,hidden:false};
  paused=false; laserSndOff();
  state=S.PLAY;
}
function tick(){
  frame++;
  updateBg();
  if(state===S.PLAY&&!paused){
    stageFrame++;
    runScript();
    if(warningT>0){ warningT--; if(warningT%34===0) sfxWarn(); }
    updatePlayer();
    updateShots();
    updateEnemies();
    updateBoss();
    updateEbul();
    if(state===S.PLAY) collide();
    updateChain();
  }
  updateFx();
}
function render(){
  ctx.save();
  if(shake>0) ctx.translate(rnd(-shake,shake),rnd(-shake,shake));
  drawBg();
  if(state!==S.TITLE){
    drawShots();
    drawEnemies();
    drawBoss();
    drawLaser();
    drawPlayer();
    drawEbul();
  }
  drawFx();
  ctx.restore();
  if(state!==S.TITLE) drawHUD();
  drawStateOverlay();
}
let last=0, acc=0; const STEP=1000/60;
function loop(ts){
  requestAnimationFrame(loop);
  if(!last) last=ts;
  let d=ts-last; last=ts;
  if(d>100) d=100;
  acc+=d;
  while(acc>=STEP){ acc-=STEP; tick(); }
  render();
}
addEventListener('pointerdown',e=>{ if(e.pointerType==='touch') touchSeen=true; });
initBg();
requestAnimationFrame(loop);
</script>
